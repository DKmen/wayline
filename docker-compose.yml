services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: wayline
      POSTGRES_PASSWORD: wayline
      POSTGRES_DB: wayline
    ports:
      - '5432:5432'
    volumes:
      - wayline-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wayline -d wayline']
      interval: 5s
      timeout: 5s
      retries: 10

  sqs:
    image: softwaremill/elasticmq-native:1.6.9
    restart: unless-stopped
    ports:
      - '9324:9324' # SQS-compatible API
      - '9325:9325' # web UI

  s3:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: wayline
      MINIO_ROOT_PASSWORD: wayline123
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # web console
    volumes:
      - wayline-s3-data:/data

  mail:
    image: axllent/mailpit:v1.30.4
    restart: unless-stopped
    ports:
      - '8025:8025' # web UI + REST API
      - '1025:1025' # SMTP

volumes:
  wayline-db-data:
  wayline-s3-data:
