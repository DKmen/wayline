name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm run typecheck:scripts
      - run: pnpm run verify:lint-rules
      - run: pnpm run verify:no-hardcoded-colors
      - run: pnpm test:coverage
      - name: Install Playwright Chromium
        # playwright is a packages/ui-local devDependency, not root's — must run scoped
        # to that package so pnpm resolves its own node_modules/.bin, not root's.
        run: pnpm --filter @wayline/ui exec playwright install --with-deps chromium
      - name: Storybook a11y/contrast tier (not coverage-gated — real-browser only)
        run: pnpm --filter @wayline/ui test:storybook
      - run: pnpm build

  commitlint:
    name: commitlint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # gitleaks-action calls GET /pulls/{number}/commits to diff a PR's commit range —
      # needed even with PR comments disabled (GITLEAKS_ENABLE_COMMENTS: 'false').
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: 'false'

  e2e-smoke:
    name: e2e-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium (fixture)
        # @playwright/test is an apps/fixture-local devDependency, not root's — a separate
        # runner from `quality`'s own Playwright install (different job, different VM, no
        # shared browser cache), even though both pin the same Playwright version.
        run: pnpm --filter @wayline/fixture exec playwright install --with-deps chromium
      - name: 'e2e smoke suite: fixture (Playwright, not coverage-gated)'
        # No extra `--` before --grep: `pnpm --filter <pkg> <script> -- <args>` forwards
        # everything after -- as one literal blob into the underlying `playwright test`
        # invocation, so Playwright's own CLI parser sees "-- --grep @smoke" and treats
        # --grep/its value as positional file-pattern args, not flags — silently running
        # the full suite regardless of the tag filter. Confirmed via `--list`: with the
        # extra --, --grep is ignored; without it, the filter genuinely narrows the run.
        run: pnpm --filter @wayline/fixture test:e2e --grep @smoke
      - name: Install Playwright Chromium (dashboard)
        # if: always() — a fixture e2e failure must not silently skip the dashboard suite;
        # each app's e2e run is independent and both results should be visible.
        if: always()
        # Separate devDependency install, same rationale as the fixture one above.
        run: pnpm --filter @wayline/dashboard exec playwright install --with-deps chromium
      - name: 'e2e smoke suite: dashboard (Playwright, not coverage-gated)'
        if: always()
        run: pnpm --filter @wayline/dashboard test:e2e --grep @smoke
      - name: Upload Playwright HTML reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            apps/fixture/playwright-report/
            apps/dashboard/playwright-report/
          retention-days: 7
