name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm run typecheck:scripts
      - run: pnpm run verify:lint-rules
      - run: pnpm run verify:no-hardcoded-colors
      - run: pnpm test:coverage
      - name: Install Playwright Chromium
        # playwright is a packages/ui-local devDependency, not root's — must run scoped
        # to that package so pnpm resolves its own node_modules/.bin, not root's.
        run: pnpm --filter @wayline/ui exec playwright install --with-deps chromium
      - name: Storybook a11y/contrast tier (not coverage-gated — real-browser only)
        run: pnpm --filter @wayline/ui test:storybook
      - run: pnpm build

  commitlint:
    name: commitlint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # gitleaks-action calls GET /pulls/{number}/commits to diff a PR's commit range —
      # needed even with PR comments disabled (GITLEAKS_ENABLE_COMMENTS: 'false').
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: 'false'
