pre-commit:
  parallel: true
  commands:
    lint-staged:
      run: pnpm exec lint-staged

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-push:
  commands:
    test-affected:
      # Falls back to a full run when origin/main can't be resolved (first-ever push,
      # shallow clone, or a base ref that hasn't been fetched yet).
      run: >-
        if git rev-parse --verify origin/main >/dev/null 2>&1; then
          pnpm exec turbo run test --filter='...[origin/main...HEAD]';
        else
          pnpm exec turbo run test;
        fi
