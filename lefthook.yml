pre-commit:
  parallel: true
  commands:
    lint-staged:
      run: pnpm exec lint-staged

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-push:
  commands:
    test:
      # vitest.config.ts is a single shared root config (not per-package), so a
      # turbo --filter=affected invocation doesn't actually narrow what runs — every
      # invocation executes the same full-repo suite regardless of which package
      # triggered it. Running it directly, once, is simpler and avoids the parallel
      # per-package invocations racing on the same coverage output directory.
      run: pnpm test
